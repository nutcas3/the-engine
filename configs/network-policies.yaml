apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: engine-function-policy
  labels:
    app: engine-function
    component: crossplane-function
spec:
  podSelector:
    matchLabels:
      app: engine-function
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: engine-ui
    ports:
    - protocol: TCP
      port: 9443
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: engine-ui-policy
  labels:
    app: engine-ui
    component: ui-backend
spec:
  podSelector:
    matchLabels:
      app: engine-ui
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: engine-function
    ports:
    - protocol: TCP
      port: 9443
  - to:
    - podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocyclo
    - misspell
    - unconvert
    - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0


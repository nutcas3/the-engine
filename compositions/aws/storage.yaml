apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aws-storage
  labels:
    provider: aws
    engine.io/composition: storage
spec:
  compositeTypeRef:
    apiVersion: engine.io/v1alpha1
    kind: XCompute
  resources:
  - name: aws-volume
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: Volume
    patches:
    - fromFieldPath: "spec.provider"
      toFieldPath: "metadata.labels[engine.io/provider]"
    - fromFieldPath: "spec.region"
      toFieldPath: "spec.forProvider.availabilityZone"
    - type: FromCompositeFieldPath
      fromFieldPath: "spec.tier"
      toFieldPath: "spec.forProvider.size"
      transforms:
      - type: map
        map:
          micro: "20"
          small: "50"
          pro: "100"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.type"
      transforms:
      - type: map
        map:
          default: "gp3"

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: azure-storage
  labels:
    provider: azure
    engine.io/composition: storage
spec:
  compositeTypeRef:
    apiVersion: engine.io/v1alpha1
    kind: XCompute
  resources:
  - name: azure-disk
    base:
      apiVersion: compute.azure.upbound.io/v1beta1
      kind: Disk
    patches:
    - fromFieldPath: "spec.provider"
      toFieldPath: "metadata.labels[engine.io/provider]"
    - fromFieldPath: "spec.region"
      toFieldPath: "spec.forProvider.location"
    - type: FromCompositeFieldPath
      fromFieldPath: "spec.tier"
      toFieldPath: "spec.forProvider.diskSizeGB"
      transforms:
      - type: map
        map:
          micro: "20"
          small: "50"
          pro: "100"
    - type: FromCompositeFieldPath
      fromFieldPath: "metadata.name"
      toFieldPath: "spec.forProvider.sku"
      transforms:
      - type: map
        map:
          default: "Premium_LRS"

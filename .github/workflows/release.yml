name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test ./...

      - name: Build CLI binary
        run: make build-cli

      - name: Build function binary
        run: make build

      - name: Build UI binary
        run: go build -o bin/engine-ui ./cmd/ui

      - name: Create release archive
        run: |
          mkdir -p release
          cp bin/engine-cli release/
          cp bin/engine-fn release/
          cp bin/engine-ui release/
          cp install.sh release/
          tar -czf release/engine-${{ github.ref_name }}.tar.gz -C release .
          zip -r release/engine-${{ github.ref_name }}.zip release/*

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/engine-*.tar.gz
            release/engine-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push engine-function
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.function
          push: true
          tags: |
            nutcas3/engine-function:${{ github.ref_name }}
            nutcas3/engine-function:latest

      - name: Build and push engine-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build/Dockerfile.ui
          push: true
          tags: |
            nutcas3/engine-ui:${{ github.ref_name }}
            nutcas3/engine-ui:latest

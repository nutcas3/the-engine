apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-ui
  labels:
    app: engine-ui
    component: ui-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: engine-ui
  template:
    metadata:
      labels:
        app: engine-ui
        component: ui-backend
    spec:
      containers:
      - name: engine-ui
        image: engine-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        env:
        - name: KUBECONFIG
          value: "/etc/kubeconfig/config"
        - name: PORT
          value: "8080"
        volumeMounts:
        - name: kubeconfig
          mountPath: /etc/kubeconfig
          readOnly: true
      volumes:
      - name: kubeconfig
        configMap:
          name: kubeconfig
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engine-ui-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engine-ui
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
